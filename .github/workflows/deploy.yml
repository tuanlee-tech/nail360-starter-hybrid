name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # Cho phép chạy thủ công và chọn module cần build từ giao diện GitHub
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Danh sách các module cần build (ví dụ: home,Landing)'
        required: true
        default: 'home,SalonDetail,Landing'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ReactApp/package-lock.json

      - name: Install dependencies
        run: |
          cd ReactApp
          npm install

      - name: Build React App
        run: |
          cd ReactApp
          npm run build
        env:
          # Ưu tiên lấy từ input thủ công, nếu không có thì dùng mặc định
          BUILD_TARGET: ${{ github.event.inputs.build_target || 'home,SalonDetail,Landing' }}
          # Cấu hình đường dẫn Assets cho GitHub Pages (Sub-path /nail360-starter-hybrid/)
          PUBLIC_PATH: /nail360-starter-hybrid/assets/react/

      - name: Prepare GH-Pages folder
        run: |
          mkdir -p deploy
          # Copy everything from public to deploy
          cp -r public/* deploy/
          # Copy root level documentation and placeholders if needed
          cp README.md deploy/
          cp README-SETUP.md deploy/
          cp README-DEV.md deploy/
          # Create a static index.html from Landing.html produced by Webpack
          # Because GH Pages doesn't run index.php
          cp public/assets/react/Landing.html deploy/index.html
          # Fix assets path in the new index.html (if needed)

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: deploy
          branch: gh-pages
